<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src 'self' http://127.0.0.1:5000 https://openlibrary.org "https://library-backend-b4as.onrender.com"; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;"> -->
    <title>Login • Library</title>

    <link rel="stylesheet" href="./style/login.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div class="login-container">

      <form id="loginForm" class="login-card">
        <h1 class="logo">Library</h1>
        <p class="subtitle">Acesse sua biblioteca</p>
        
        <div class="input-group">
          <label>Email</label>
          <div class="input-wrapper">
            <!-- <span class="icon">📧</span> -->
            <input
              type="email"
              id="email"
              placeholder="seu@email.com"
              required/>
          </div>
        </div>

        <div class="input-group">
          <label>Senha</label>

          <div class="input-wrapper">
            <!-- <span class="icon">🔒</span> -->
            <input type="password" id="senha" placeholder="********" required />
            <i class="fa-solid fa-eye" id="togglePassword" style="cursor: pointer; opacity: 0.5;"></i>
          </div>
        </div>

        <button type="submit" id="loginBtn">
          <span class="btn-text">Entrar</span>
          <span class="loader"></span>
        </button>
        <a href="./page/cadastro.html" id="cadastrar-se">Cadastrar-se</a>
        <p id="msg"></p>
      </form>
    </div>
  
    <script type="module" src="./scripts/login.js" defer></script>
  </body>
</html>
